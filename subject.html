<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Subject</title>
    <link rel="stylesheet" href="quiz.css" />
    <link rel="icon" href="gci_logo.png" />
  </head>
  <body>
    <section class="form-cont onboarding-cont">
      <h1>Select Your Subject</h1>
      <p>Choose a subject to begin your quiz.</p>

      <div class="subject-buttons">
        <button onclick="selectSubject('English')">English</button>
        <button onclick="selectSubject('Mathematics')">Mathematics</button>
        <button onclick="selectSubject('Biology')">Biology</button>
        <button onclick="selectSubject('Computer Studies')">
          Computer Studies
        </button>
      </div>
    </section>

    <script src="auth.js"></script>
    <script>
      function selectSubject(subject) {
        localStorage.setItem("subject", subject);
        window.location.href = "exam.html";
      }
    </script>
  </body>
</html>
