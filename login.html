<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCI Exam Login-page</title>
  <link rel="stylesheet" href="quiz.css" />
  <link rel="icon" href="gci_logo.png" />
</head>
<body>
  <div class="main-cont">
    <h1>GCI CBT EXAM</h1>
    <form class="form-cont" onsubmit="login(event)">
      <div class="form-content">
        <h2>Hello!</h2>
        <p>Log in to get started</p>
        <input type="text" class="login-input"  id="username" placeholder="Student Name" required />
        <input type="password"  class="login-input" id="student-id" placeholder="Student ID Number" required />
        <button type="submit" class="login-btn">Login</button>
      </div>
    </form>
  </div>

  <script src="auth.js"></script>
  
</body>
</html>
